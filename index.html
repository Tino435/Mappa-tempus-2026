    <style>
      :root {
        --medieval-blue: #2c3e50;
        --gold: #f1c40f;
        --parchment: #e0d7c6;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        font-family: "IM Fell English SC", serif;
        background: #ccd5de;
        overflow: hidden;
        position: fixed;
      }

      .map-viewport {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
        justify-content: center;
      }

      #panzoom-element {
        display: inline-block;
        cursor: grab;
        height: 1080px;
        width: 1920px;
      }

      #map-image {
        display: block;
        height: 1080px;
        width: 1920px;
        pointer-events: none;
        max-width: none !important;
      }

      .map-controls {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: none;
        gap: 10px;
      }

      .map-controls button {
        background: var(--gold);
        color: var(--medieval-blue);
        border: 2px solid var(--medieval-blue);
        padding: 8px 15px;
        border-radius: 20px;
        font-weight: bold;
        font-family: "IM Fell English SC", serif;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        cursor: pointer;
      }

      .map-point {
        position: absolute;
        width: 50px;
        height: 50px;
        transform: translate(-50%, -50%);
        z-index: 9999;
        cursor: pointer;
        background: rgba(255, 0, 0, 0);
        pointer-events: auto;
      }

      #map-selector {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5000;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: opacity 0.5s ease;
        background: rgba(0, 0, 0, 0.6);
        box-sizing: border-box;
      }

      /* Popup (Modal) adattato per Mobile */
      .modal {
        display: none; /* Nascosto di default */
        position: fixed;
        z-index: 9999; /* Sopra la mappa */
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.7); /* Sfondo semi-trasparente */
        backdrop-filter: blur(3px); /* Effetto sfocato opzionale */
      }

      /* Il contenuto effettivo del popup */
      .modal-content {
        background-color: #fdfaf0;
        padding: 25px;
        border-radius: 15px;
        width: 85%;
        max-width: 400px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);

        /* 🪄 LA MAGIA: ADATTIVO E CENTRATO */
        height: auto !important; /* Si stringe come un abito attorno al testo */
        max-height: 85vh !important; /* Se c'è tanto testo, si ferma all'85% dello schermo */

        /* Posizionamento assoluto per centrarlo perfettamente (elimina spazi vuoti sopra e sotto) */
        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        margin: 0 !important;

        display: flex;
        flex-direction: column;
      }

      /* Pulsante di chiusura (X) */
      .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        line-height: 20px;
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 10;
      }

      .close:hover {
        color: var(--medieval-blue);
      }

      .scroll-box {
        height: auto !important; /* Non deve allungarsi da solo */
        overflow-y: auto; /* Mette la barra solo se serve davvero */
        margin-top: 15px;
        padding-right: 5px;
      }

      .scroll-box::-webkit-scrollbar {
        width: 6px;
      }
      .scroll-box::-webkit-scrollbar-track {
        background: transparent;
      }
      .scroll-box::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 10px;
      }

      .selector-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(44, 62, 80, 0.95); /* Blu medievale opaco */
        z-index: 5000; /* Sopra a ogni cosa */
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: opacity 0.5s ease;
      }

      .selector-content {
        background: var(--parchment);
        padding: 30px;
        border-radius: 20px;
        width: 85%;
        max-width: 400px;
        border: 3px solid var(--gold);
      }

      .selector-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 20px;
      }

      .selector-buttons button {
        background: var(--medieval-blue);
        color: white;
        border: 2px solid var(--gold);
        padding: 15px;
        border-radius: 10px;
        font-size: 1rem;
        font-family: "IM Fell English SC", serif;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .selector-buttons button:active {
        transform: scale(0.95);
      }

      .modal-action-btn {
        background: var(--gold);
        color: var(--medieval-blue);
        border: 2px solid var(--medieval-blue);
        padding: 12px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        font-family: "IM Fell English SC", serif;
        cursor: pointer;
        transition: transform 0.2s;
        width: 100%;
        margin-top: 5px;
      }

      /* Animazione */
      #menu-section {
        padding: 15px;
        margin-top: 10px;
        margin-bottom: 15px;

        line-height: 1.6;
        color: #333;
        background: rgba(218, 165, 32, 0.08); /* Il tuo sfondo pergamena/oro */
        border: 2px solid var(--gold);
        border-radius: 8px;
      }

      /* Schermi grandi */
      @media (min-width: 1024px) {
        .modal-content {
          margin: 0;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
        }
      }

      #modal-image {
        width: 100% !important;
        height: auto !important;
        display: block !important;
        border: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      #modal-image-container {
        margin-bottom: 15px;
        border: 3px solid var(--gold) !important;
        border-radius: 12px;
        padding: 0 !important;
        margin-top: 5px;
        overflow: hidden !important;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        box-sizing: border-box;
        flex-shrink: 0 !important;
      }

      img#modal-img[src]:not([src=""]) {
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        outline: none;
        border: none;
      }

      body.hide-controls .map-controls {
        display: none !important;
      }
    </style>
  </head>

          style="margin-bottom: 15px; display: none"

          <img id="modal-img" src="" alt="" style="width: 100%; height: auto" />
        </div>

        <div class="scroll-box">

            id="modal-title"
            style="
              color: var(--medieval-blue);
              margin-top: 0;
              margin-bottom: 15px;
              border-bottom: 2px solid var(--gold);
              padding-bottom: 8px;
            "
          ></h2>

          <div
            id="modal-text"

    <script>
      const elem = document.getElementById("panzoom-element");
      const img = document.getElementById("map-image");

      const panzoom = Panzoom(elem, {
        maxScale: 4,
        minScale: 0.3,
        contain: "outside",
        cursor: "grab",
        duration: 800,
        easing: "cubic-bezier(0.45, 0, 0.55, 1)",
      });

      elem.parentElement.addEventListener("wheel", panzoom.zoomWithWheel);

      function initMap() {
        const windowHeight = window.innerHeight;
        const targetScale = windowHeight / 1080;
        panzoom.zoom(targetScale, { animate: false });
      }

      if (img.complete) {
        initMap();
      } else {
        img.onload = initMap;
      }

      function goToZone(zone) {
        const isPC = window.innerWidth > 768;
        const slowOptions = { animate: true, duration: 750 };

        console.log("🚀 goToZone CHIAMATA! Zona:", zone);

        let zoomLevel, panX, panY;

        if (zone === "garibaldi") {
          zoomLevel = isPC ? 1 : 0.5;
          panX = isPC ? -80 : -200;
          panY = isPC ? -5 : -80;
        } else if (zone === "duomo") {
          zoomLevel = isPC ? 1 : 0.65;
          panX = isPC ? -1500 : -1500;
          panY = isPC ? 0 : -120;
        }

        panzoom.zoom(zoomLevel, slowOptions);

        setTimeout(() => {
          console.log("✈️ Avvio lo spostamento reale verso X:", panX);
          panzoom.pan(panX, panY, slowOptions);
        }, 150);
      }

      function selectZone(zone) {
        const selector = document.getElementById("map-selector");
        if (selector) {
          selector.style.opacity = "0";
          setTimeout(() => {
            selector.style.display = "none";
          }, 500);
        }

        const controls = document.querySelector(".map-controls");
        if (controls) {
          controls.style.display = "flex";
          controls.style.opacity = "0";
          controls.style.transition = "opacity 0.5s ease";
          setTimeout(() => (controls.style.opacity = "1"), 10);
        }

        // 🎯 IL CONTROLLO BLINDATO:
        if (zone === "garibaldi" || zone === "sinistra") {
          goToZone("garibaldi");
        } else if (zone === "duomo" || zone === "destra") {
          goToZone("duomo");
        }
      }

      function inquadraPunto(percentualeX, percentualeY, livelloZoom) {
        const slowOptions = { animate: true, duration: 800, force: true };

        // 1. Calcola la posizione in pixel sull'immagine originale
        const pixelX = 1920 * (percentualeX / 100);
        const pixelY = 1080 * (percentualeY / 100);

        // 2. Calcola lo spostamento (pan) necessario per centrarlo nello schermo
        const panX = window.innerWidth / 2 - pixelX * livelloZoom;
        const panY = window.innerHeight / 2 - pixelY * livelloZoom;

        // 3. Applica zoom e pan
        panzoom.zoom(livelloZoom, slowOptions);
        panzoom.pan(panX, panY, slowOptions);
      }

      // Questo stamperà in console la X e la Y ogni volta che trascini la mappa
      elem.addEventListener("panzoompan", (e) => {
        console.log(
          "X:",
          Math.round(e.detail.x),
          " Y:",
          Math.round(e.detail.y),
        );
      });

      function showInfo(title, description, menu, imageSrc) {
        // 1. INSERISCE I TESTI BASE
        document.getElementById("modal-title").innerHTML = title || "";
        document.getElementById("modal-text").innerHTML = description || "";

        // 2. GESTISCE IL MENÙ
        const menuSection = document.getElementById("menu-section");
        if (menu && typeof menu === "string" && menu.trim() !== "") {
          menuSection.innerHTML = menu;
          menuSection.style.display = "block";
        } else {
          menuSection.innerHTML = "";
          menuSection.style.display = "none";
        }

        // 3. GESTISCE L'IMMAGINE
        const imageContainer = document.getElementById("modal-image-container");
        const imageElement = document.getElementById("modal-img");

        if (
          imageSrc &&
          typeof imageSrc === "string" &&
          imageSrc.trim() !== ""
        ) {
          imageElement.src = imageSrc;
          imageElement.style.display = "block";
          imageContainer.style.display = "block";
        } else {
          imageElement.removeAttribute("src");
          imageElement.style.display = "none";
          imageContainer.style.display = "none";
        }

        // 4. APRE IL POPUP
        document.getElementById("infoModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("infoModal").style.display = "none";
      }

      window.onclick = function (event) {
        // 1. CHIUSURA DELLA MODALE
        const infoModal = document.getElementById("infoModal");
        if (event.target === infoModal) {
          closeModal();
        }
      };

      <td style="padding: 8px; border-bottom: 1px solid var(--gold);">€ 3,00</td>

    <b>Venerdì e Sabato:</b> 18:00 - 01:15<br>

    </script>
